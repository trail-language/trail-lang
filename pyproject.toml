[project]
name = "trail-lang"
version = "0.1.0"
description = "Trail — a declarative expression language for financial indicators, scoring, and screening over security panels"
requires-python = ">=3.11"
dependencies = [
    "lark>=1.2",
    "polars>=1.20",
    "click>=8.1",
    "pyyaml>=6",
]

[project.scripts]
trail = "trail.cli:main"

[dependency-groups]
dev = ["pytest>=8", "ruff>=0.8", "pandas>=2.2", "pyarrow>=17"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["trail"]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
